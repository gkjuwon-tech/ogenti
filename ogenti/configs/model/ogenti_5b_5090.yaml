# Model config tuned for RTX 5090 32GB single-GPU.
# Same architecture as ogenti_5b.yaml but with:
#   - smaller glyph branch (640 dim instead of 1024)
#   - fewer entity slots (16 instead of 32)
#   - skin/material heads reduced (32 hidden instead of 64/48)

_target_: ogenti.models.ogenti_transformer.OgentiTransformerConfig

in_channels: 16
out_channels: 16
dim: 3072
num_blocks: 30
num_heads: 24
head_dim: 128
mlp_ratio: 4.0
text_dim: 4096
cond_dim: 3072

patch:
  in_channels: 16
  embed_dim: 3072
  patch_size: [1, 2, 2]

rope:
  head_dim: 128
  t_split: 32
  h_split: 48
  w_split: 48

entity:
  num_slots: 16
  dim: 3072
  init_scale: 0.02

glyph:
  in_channels: 3
  embed_dim: 640
  patch_size: [8, 8]
  num_blocks: 2
  num_heads: 10
  head_dim: 64
  out_dim: 3072
  max_regions: 8
  tokens_per_region: 16

enable_entity_attention: true
enable_glyph_fusion: true
glyph_fusion_start_block: 22

enable_camera_motion_cond: true
camera_motion:
  descriptor_dim: 8
  embed_dim: 128
  out_dim: 3072
  zero_init: true

enable_skin_detail_head: false   # off in smoke
skin_detail:
  in_channels: 3
  hidden: 32
  num_blocks: 2
  out_channels: 3
  residual_scale_init: 0.0
  cond_dim: 64

enable_physics_keyframes_cond: false
physics_keyframes:
  max_objects: 8
  tokens_per_object: 16
  descriptor_per_token: 10
  embed_dim: 128
  out_dim: 3072
  zero_init: true
