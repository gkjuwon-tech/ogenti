# Model config for Wan2.2-{T2V,I2V}-A14B retrofit target.
#
# A14B is the 14B-param MoE-style "big sibling" of TI2V-5B. Two experts
# (high_noise_model + low_noise_model) share architecture but specialize on
# different timestep regions of the rectified-flow trajectory. This config
# describes one expert; load the other via `--expert {high_noise,low_noise}`
# in the retrofit script (default: low_noise — the fine-detail expert that
# carries the final-step quality bar for ad creative).
#
# Architecture (matches upstream Wan2.2 A14B):
#   - dim:        5120
#   - num_blocks: 40
#   - num_heads:  40 (head_dim 128)
#   - ffn_hidden: 13824  (SwiGLU: dim * 4.0 * 2 / 3 rounded up to multiple of 256)
#   - text_dim:   4096   (T5 last_hidden_state, same encoder as 5B)
#   - patch:      [1, 2, 2] (latent T/H/W)
#   - latent VAE: 16 channels, 4× temporal / 8× spatial compression

_target_: ogenti.models.ogenti_transformer.OgentiTransformerConfig

in_channels: 16
out_channels: 16
dim: 5120
num_blocks: 40
num_heads: 40
head_dim: 128
mlp_ratio: 4.0
text_dim: 4096
cond_dim: 5120

patch:
  in_channels: 16
  embed_dim: 5120
  patch_size: [1, 2, 2]

rope:
  head_dim: 128
  t_split: 32
  h_split: 48
  w_split: 48

entity:
  num_slots: 64
  dim: 5120
  init_scale: 0.02

glyph:
  in_channels: 3
  embed_dim: 1280
  patch_size: [8, 8]
  num_blocks: 6
  num_heads: 20
  head_dim: 64
  out_dim: 5120
  max_regions: 16
  tokens_per_region: 32

enable_entity_attention: true
enable_glyph_fusion: true
glyph_fusion_start_block: 28

enable_camera_motion_cond: true
camera_motion:
  descriptor_dim: 8
  embed_dim: 256
  out_dim: 5120
  zero_init: true

enable_subject_motion_cond: true
subject_motion:
  descriptor_dim: 8
  max_tracks: 4
  embed_dim: 256
  out_dim: 5120
  zero_init: true

enable_micro_events_cond: true
micro_events:
  cond_dim: 5120

enable_physics_keyframes_cond: true
physics_keyframes:
  max_objects: 8
  tokens_per_object: 16
  descriptor_per_token: 10
  embed_dim: 256
  out_dim: 5120
  zero_init: true

enable_skin_detail_head: true
skin_detail:
  in_channels: 3
  hidden: 96
  num_blocks: 6
  out_channels: 3
  residual_scale_init: 0.0
  cond_dim: 96

enable_material_detail_head: true
enable_motion_blur_head: true
enable_film_grain_head: true
enable_lens_artifacts: true
