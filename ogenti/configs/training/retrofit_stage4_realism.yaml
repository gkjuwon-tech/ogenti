# Stage 4: AI-tell killer — unlocks SDRH (skin) + camera motion conditioning
# + frequency loss + temporal realism loss. Identity / anatomy / glyph already trained.

stage_name: retrofit_stage4_realism
seed: 42

dataset:
  _target_: ogenti.data.loaders.video_dataset.VideoDatasetConfig
  manifest_path: data/manifests/ads_train.jsonl
  root: data/
  target_frames: 81
  target_height: 480
  target_width: 832
  target_fps: 24
  load_keypoints: true
  load_glyph_regions: true
  load_skin_masks: true
  load_camera_motion: true
  load_subject_motion: true
  load_material_masks: true
  load_object_trajectories: true
  max_glyph_regions: 16
  glyph_crop_size: 128

dataloader:
  batch_size: 1
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  gradient_accumulation_steps: 4

optim:
  optimizer: adamw
  lr: 5.0e-6
  betas: [0.9, 0.95]
  weight_decay: 0.01
  grad_clip: 1.0

scheduler:
  type: cosine
  warmup_steps: 300
  total_steps: 15000
  min_lr: 1.0e-7

flow:
  shift: 7.0
  logit_mean: 0.0
  logit_std: 1.0

loss_weights:
  diffusion: 1.0
  identity: 0.05
  anatomy: 0.3
  ocr: 0.2
  frequency_skin: 0.4
  temporal_realism: 0.3
  physics: 0.2
  motion_realism: 0.3

retrofit:
  freeze_backbone_weights: true
  unfreeze_modules:
    - "skin_detail_head"
    - "camera_motion_embed"
    - "subject_motion_embed"
    - "micro_event_embed"
    - "material_detail_head"
    - "motion_blur_head"
    - "film_grain_head"
    - "lens_artifact_head"
    - "blocks.*.glyph_fuse"
    - "glyph_branch"

logging:
  run_dir: outputs/runs/retrofit_stage4_realism
  wandb_project: ogenti
  log_every: 50
  ckpt_every: 1000
  sample_every: 500
  num_sample_videos: 4

precision:
  dtype: bfloat16
  grad_scaler: false
  gradient_checkpointing: true
